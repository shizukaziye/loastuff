name: Refresh baked market data

# The deal finder bakes its market data into loa-deal-finder/index.html, and the
# crafting calculator bakes a price snapshot into loa-crafting-calculator/index.html.
# These used to run in the standalone repos; now that both tools live in this
# monorepo, the refresh runs here and commits back (which redeploys via Pages).
on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh deal finder (bakes const DEALS into index.html)
        working-directory: loa-deal-finder
        run: python3 refresh_deals.py

      - name: Refresh crafting price snapshot
        working-directory: loa-crafting-calculator
        run: python3 refresh_prices.py

      - name: Commit refreshed data if changed
        run: |
          if git diff --quiet -- loa-deal-finder/index.html loa-crafting-calculator/index.html; then
            echo "No data changes."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add loa-deal-finder/index.html loa-crafting-calculator/index.html
          git commit -m "Auto-refresh baked market data (deal finder + crafting)"
          git push
